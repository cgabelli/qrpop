name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Generate Prisma Client
        working-directory: web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma generate

      - name: Build
        working-directory: web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_BASIC_IMAGE: ${{ secrets.STRIPE_PRICE_BASIC_IMAGE }}
          STRIPE_PRICE_UNLIMITED_IMAGE: ${{ secrets.STRIPE_PRICE_UNLIMITED_IMAGE }}
          STRIPE_PRICE_BASIC_VIDEO: ${{ secrets.STRIPE_PRICE_BASIC_VIDEO }}
          STRIPE_PRICE_UNLIMITED_VIDEO: ${{ secrets.STRIPE_PRICE_UNLIMITED_VIDEO }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/qrpop
            git pull origin main
            cd web
            npm ci --production
            npx prisma generate
            npx prisma migrate deploy
            pm2 restart qrpop || pm2 start npm --name qrpop -- start
