name: Deploy to AlmaLinux (Plesk)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy source code via SSH/rsync
        uses: easingthemes/ssh-deploy@v5.1.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: "./"
          TARGET: "/var/www/vhosts/qrpop.it/httpdocs"
          EXCLUDE: "/node_modules/, /.git/, /.next/, /.env*"
          ARGS: "-rltgoDzvO --delete"

      - name: Build & Restart on Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "/root/.nvm/nvm.sh" ] && \. "/root/.nvm/nvm.sh"

            cd /var/www/vhosts/qrpop.it/httpdocs

            # Write .env without indentation (heredoc with leading spaces breaks key=value parsing)
            printf '%s\n' \
              'DATABASE_URL=${{ secrets.DATABASE_URL }}' \
              'NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}' \
              'NEXTAUTH_URL=https://qrpop.it' \
              'NEXT_PUBLIC_APP_URL=https://qrpop.it' \
              'NODE_ENV=production' \
              'SMTP_HOST=localhost' \
              'SMTP_PORT=25' \
              'SMTP_FROM=noreply@qrpop.it' \
              'STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}' \
              'STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}' \
              'STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}' \
              'STRIPE_PRICE_IMAGE_ANNUAL=${{ secrets.STRIPE_PRICE_IMAGE_ANNUAL }}' \
              'STRIPE_PRICE_VIDEO_ANNUAL=${{ secrets.STRIPE_PRICE_VIDEO_ANNUAL }}' \
              'STRIPE_PRICE_PDF_ANNUAL=${{ secrets.STRIPE_PRICE_PDF_ANNUAL }}' \
              'STRIPE_PRICE_UNLIMITED_ANNUAL=${{ secrets.STRIPE_PRICE_UNLIMITED_ANNUAL }}' \
              > .env

            npm install --legacy-peer-deps
            npx prisma generate
            # Build: if fails, abort without touching PM2 (keeps old version live)
            npm run build || { echo "❌ BUILD FAILED - keeping old version live"; exit 1; }

            pm2 delete qrpop 2>/dev/null || true
            pm2 delete qrpop-web 2>/dev/null || true
            pm2 start /var/www/vhosts/qrpop.it/httpdocs/ecosystem.config.cjs
            pm2 save
            pm2 list
