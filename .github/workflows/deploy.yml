name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma generate



      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/qrpop
            git pull origin main
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env
            echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env
            echo "NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}" >> .env
            echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> .env
            echo "STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}" >> .env
            echo "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" >> .env
            echo "STRIPE_PRICE_BASIC_IMAGE=${{ secrets.STRIPE_PRICE_BASIC_IMAGE }}" >> .env
            echo "STRIPE_PRICE_UNLIMITED_IMAGE=${{ secrets.STRIPE_PRICE_UNLIMITED_IMAGE }}" >> .env
            echo "STRIPE_PRICE_BASIC_VIDEO=${{ secrets.STRIPE_PRICE_BASIC_VIDEO }}" >> .env
            echo "STRIPE_PRICE_UNLIMITED_VIDEO=${{ secrets.STRIPE_PRICE_UNLIMITED_VIDEO }}" >> .env
            npm ci
            npx prisma generate
            npx prisma db push --accept-data-loss
            npm run build
            pm2 restart qrpop || pm2 start npm --name qrpop -- start
