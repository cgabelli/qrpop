name: Deploy to AlmaLinux (Plesk)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy source code via SSH/rsync
        uses: easingthemes/ssh-deploy@v5.1.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: "./"
          TARGET: "/var/www/vhosts/qrpop.it/app"
          EXCLUDE: "/node_modules/, /.git/, /.next/, /.env*/"
          ARGS: "-rltgoDzvO --delete"

      - name: Build & Restart on Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DATABASE_URL,NEXTAUTH_SECRET
          script_stop: true
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /var/www/vhosts/qrpop.it/app
            npm install --legacy-peer-deps
            export DATABASE_URL="${DATABASE_URL}"
            export NEXTAUTH_SECRET="${NEXTAUTH_SECRET}"
            npx prisma generate
            npx prisma db push --accept-data-loss
            npm run build
            pm2 restart qrpop-web || pm2 start ecosystem.config.cjs
            pm2 save
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
