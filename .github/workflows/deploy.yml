name: Deploy to AlmaLinux (Plesk)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy source code via SSH/rsync
        uses: easingthemes/ssh-deploy@v5.1.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: "./"
          TARGET: "/var/www/vhosts/qrpop.it/app"
          EXCLUDE: "/node_modules/, /.git/, /.next/, /.env*/"
          ARGS: "-rltgoDzvO --delete"

      - name: Build & Restart on Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            # Load NVM (try multiple locations)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "/root/.nvm/nvm.sh" ] && \. "/root/.nvm/nvm.sh"
            [ -s "/usr/local/nvm/nvm.sh" ] && \. "/usr/local/nvm/nvm.sh"
            
            # Show environment for diagnostics
            echo "Node: $(node -v 2>/dev/null || which node || echo NOT FOUND)"
            echo "NPM: $(npm -v 2>/dev/null || echo NOT FOUND)"
            echo "PWD: $(pwd)"
            
            # Go to app directory (create if needed)
            mkdir -p /var/www/vhosts/qrpop.it/app
            cd /var/www/vhosts/qrpop.it/app
            echo "In dir: $(pwd), files: $(ls | head -5)"
            
            npm install --legacy-peer-deps
            DATABASE_URL="${{ secrets.DATABASE_URL }}" npx prisma generate
            DATABASE_URL="${{ secrets.DATABASE_URL }}" npx prisma db push --accept-data-loss
            DATABASE_URL="${{ secrets.DATABASE_URL }}" NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" NEXT_PUBLIC_APP_URL="https://qrpop.it" npm run build
            # Force PM2 to restart from the new directory
            pm2 delete qrpop-web 2>/dev/null || true
            pm2 start /var/www/vhosts/qrpop.it/app/ecosystem.config.cjs
            pm2 save
            echo "PM2 status:"
            pm2 list
