name: Deploy to AlmaLinux (Plesk)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy source code via SSH/rsync
        uses: easingthemes/ssh-deploy@v5.1.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: "./"
          TARGET: "/var/www/vhosts/qrpop.it/httpdocs"
          EXCLUDE: "/node_modules/, /.git/, /.next/, /.env*"
          ARGS: "-rltgoDzvO --delete"

      - name: Build & Restart on Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "/root/.nvm/nvm.sh" ] && \. "/root/.nvm/nvm.sh"

            cd /var/www/vhosts/qrpop.it/httpdocs

            # Write .env without indentation (heredoc with leading spaces breaks key=value parsing)
            printf '%s\n' \
              'DATABASE_URL=${{ secrets.DATABASE_URL }}' \
              'NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}' \
              'NEXTAUTH_URL=https://qrpop.it' \
              'NEXT_PUBLIC_APP_URL=https://qrpop.it' \
              'NODE_ENV=production' \
              'SMTP_HOST=localhost' \
              'SMTP_PORT=25' \
              'SMTP_FROM=noreply@qrpop.it' \
              > .env

            npm install --legacy-peer-deps
            npx prisma generate
            npm run build

            # Crea/aggiorna account admin (verificationToken null = account verificato)
            node -e "
            const {PrismaClient} = require('@prisma/client');
            const b = require('bcryptjs');
            const db = new PrismaClient();
            b.hash('Qrpop2024!', 12).then(h =>
              db.user.upsert({
                where:{email:'cgabelli@gmail.com'},
                update:{password:h, verificationToken:null},
                create:{
                  email:'cgabelli@gmail.com',
                  password:h,
                  slug:'christian-gabelli',
                  isActive:true,
                  businessName:'Christian Gabelli',
                  isCompany:false,
                  firstName:'Christian',
                  lastName:'Gabelli',
                  address:'Via Roma 1',
                  city:'Milano',
                  province:'MI',
                  zipCode:'20100',
                  verificationToken:null
                }
              })
            ).then(() => { console.log('Account OK'); db.\$disconnect(); })
            .catch(e => { console.error('Account error:', e.message); db.\$disconnect(); });
            "

            pm2 delete qrpop 2>/dev/null || true
            pm2 delete qrpop-web 2>/dev/null || true
            pm2 start /var/www/vhosts/qrpop.it/httpdocs/ecosystem.config.cjs
            pm2 save
            pm2 list
